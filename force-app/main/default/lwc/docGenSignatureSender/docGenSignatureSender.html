<template>
    <div class="slds-p-around_medium">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:false={finalUrl}>
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    name="document"
                    label="Select Document to Sign"
                    value={selectedDocId}
                    placeholder="Choose a recently generated document"
                    options={documentOptions}
                    onchange={handleDocChange}
                    required>
                </lightning-combobox>
            </div>

            <div class="slds-m-bottom_medium">
                <lightning-input 
                    type="text" 
                    label="Signer Name" 
                    value={signerName} 
                    onchange={handleNameChange}
                    required>
                </lightning-input>
            </div>

            <div class="slds-m-bottom_medium">
                <lightning-input 
                    type="email" 
                    label="Signer Email" 
                    value={signerEmail} 
                    onchange={handleEmailChange}
                    required>
                </lightning-input>
            </div>

            <div class="slds-m-top_large">
                <lightning-button 
                    variant="brand" 
                    label="Generate Signature Link" 
                    title="Generate Signature Link" 
                    onclick={handleGenerate} 
                    disabled={isGenerateDisabled}
                    class="slds-m-left_x-small">
                </lightning-button>
            </div>
            
            <template if:true={error}>
                <div class="slds-text-color_error slds-m-top_medium">{error}</div>
            </template>
        </template>

        <template if:true={finalUrl}>
            <div class="slds-notify slds-notify_alert slds-theme_success slds-m-bottom_medium" role="alert">
                <h2>Ready for Signature!</h2>
            </div>
            <p class="slds-m-bottom_small">The signature request has been generated. Provide the following secure link to the signer:</p>
            <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-text-body_regular slds-wrap" style="word-break: break-all;">
                <a href={finalUrl} target="_blank">{finalUrl}</a>
            </div>
            <lightning-button 
                variant="neutral" 
                label="Copy Link" 
                icon-name="utility:copy"
                onclick={handleCopyUrl}>
            </lightning-button>
        </template>
    </div>
</template>
