<template>
    <lightning-card title="DocGen Secure E-Signature Setup" icon-name="custom:custom108">
        <div class="slds-p-around_medium">
            <template if:false={isLoaded}>
                <div class="slds-is-relative" style="height: 100px;">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>
            
            <template if:true={isLoaded}>
                <!-- Introduction Banner -->
                <div class="slds-notify slds-notify_alert slds-theme_info slds-m-bottom_large" role="alert">
                    <span class="slds-assistive-text">info</span>
                    <h2>Public E-Signatures require a secure API Loopback to generate background PDFs. Complete these steps to configure the OAuth integration and Experience Site so Guest Users can sign documents securely.</h2>
                </div>

                <!-- Progress Bar -->
                <lightning-progress-indicator current-step={currentStep} type="path" variant="base" class="slds-m-bottom_large">
                    <lightning-progress-step label="1. Connected App" value="1" onclick={handleStepClick}></lightning-progress-step>
                    <lightning-progress-step label="2. Auth Provider" value="2" onclick={handleStepClick}></lightning-progress-step>
                    <lightning-progress-step label="3. Named Credential" value="3" onclick={handleStepClick}></lightning-progress-step>
                    <lightning-progress-step label="4. Experience Site" value="4" onclick={handleStepClick}></lightning-progress-step>
                </lightning-progress-indicator>

                <!-- Step 1 -->
                <template if:true={isStep1}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-m-bottom_small 0">Step 1: Create the Connected App</h2>
                        <ol class="slds-list_ordered slds-m-left_medium slds-m-bottom_medium slds-text-body_regular">
                            <li>Go to <strong>Setup > App Manager</strong> and click <strong>New Connected App</strong>.</li>
                            <li>Name it: <strong>DocGen Loopback</strong>, Contact Email: your email.</li>
                            <li>Check <strong>Enable OAuth Settings</strong>.</li>
                            <li>Set the Callback URL to exactly:<br/>
                                <div class="slds-box slds-theme_shade slds-m-top_xx-small slds-m-bottom_small"><strong>{callbackUrl}</strong></div>
                            </li>
                            <li>Add the <strong>"Manage user data via APIs (api)"</strong> scope and <strong>"Perform requests at any time (refresh_token, offline_access)"</strong> scope.</li>
                            <li>Save the app. <strong>Ignore the 10-minute wait warning.</strong></li>
                            <li>Click <strong>Manage Consumer Details</strong> (you may need to verify your identity) and copy the <strong>Consumer Key</strong> and <strong>Consumer Secret</strong> somewhere safe.</li>
                        </ol>
                        <lightning-button variant="brand" label="Next Step" onclick={nextStep}></lightning-button>
                    </div>
                </template>

                <!-- Step 2 -->
                <template if:true={isStep2}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-m-bottom_small">Step 2: Create the Auth Provider</h2>
                        <ol class="slds-list_ordered slds-m-left_medium slds-m-bottom_medium slds-text-body_regular">
                            <li>Go to <strong>Setup > Auth. Providers</strong> and click <strong>New</strong>.</li>
                            <li>Select Provider Type: <strong>Salesforce</strong>.</li>
                            <li>Name it exactly: <strong>DocGen Auth Provider</strong>. The URL Suffix must be: <strong>DocGen_Auth_Provider</strong>.</li>
                            <li>Paste the <strong>Consumer Key</strong> and <strong>Consumer Secret</strong> you copied in Step 1.</li>
                            <li>Set Default Scopes to: <strong>api refresh_token</strong>.</li>
                            <li>Leave everything else default and click <strong>Save</strong>.</li>
                        </ol>
                        <lightning-button label="Back" onclick={prevStep} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Next Step" onclick={nextStep}></lightning-button>
                    </div>
                </template>

                <!-- Step 3 -->
                <template if:true={isStep3}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-m-bottom_small">Step 3: Create the Named Credential</h2>
                        <ol class="slds-list_ordered slds-m-left_medium slds-m-bottom_medium slds-text-body_regular">
                            <li>Go to <strong>Setup > Named Credentials</strong>. Select the <strong>External Credentials</strong> tab and click <strong>New</strong>.</li>
                            <li>Name it: <strong>DocGen Loopback Auth</strong>. Set Auth Protocol to <strong>OAuth 2.0</strong> and Authentication Flow to <strong>Browser Flow</strong>.</li>
                            <li>Select the <strong>DocGen Auth Provider</strong> you just created and save.</li>
                            <li>On the External Credential record, scroll to <strong>Principals</strong> and click New. Name: <strong>Admin</strong>, sequence: 1. Save it.</li>
                            <li><strong>CRITICAL:</strong> Click the dropdown arrow next to the new Admin principal and select <strong>Authenticate</strong>. Follow the prompts to click "Allow" and establish the connection.</li>
                            <li>Go back to the <strong>Named Credentials</strong> tab and click <strong>New</strong>.</li>
                            <li>Name it exactly: <strong>DocGen_Loopback</strong>. The URL must be: <strong>{orgUrl}</strong></li>
                            <li>Select your External Credential, enable <strong>Generate Authorization Header</strong>, and Save.</li>
                            <li><strong>IMPORTANT:</strong> Go to <strong>Setup > Permission Sets</strong> and open <strong>DocGen Admin</strong>.</li>
                            <li>Click <strong>External Credential Principal Access</strong>, click Edit, and add your new <strong>DocGen Loopback Auth - Admin</strong> principal. Repeat this for the <strong>DocGen User</strong> permission set.</li>
                        </ol>
                        <lightning-button label="Back" onclick={prevStep} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Next Step" onclick={nextStep}></lightning-button>
                    </div>
                </template>

                <!-- Step 4 -->
                <template if:true={isStep4}>
                    <div class="slds-box slds-theme_default">
                        <h2 class="slds-text-heading_medium slds-m-bottom_small">Step 4: Experience Site Configuration</h2>
                        <p class="slds-m-bottom_medium">Enter the base URL of your Experience Cloud site and the path to the page where you embedded the <strong>DocGen Signature Submission</strong> flow.</p>
                        
                        <div class="slds-form-element slds-m-bottom_medium">
                            <lightning-input 
                                type="url" 
                                label="Experience Site URL (with page path)" 
                                placeholder="https://yoursite.com/s/sign"
                                value={experienceSiteUrl}
                                onchange={handleUrlChange}
                                required>
                            </lightning-input>
                            <p class="slds-text-body_small slds-m-top_xx-small">Example: https://docgen-portal.my.site.com/s/sign-document</p>
                        </div>

                        <div class="slds-notify slds-notify_alert slds-theme_success slds-m-bottom_medium" role="alert">
                            <h2>Configuration Complete! E-Signatures are ready for production.</h2>
                        </div>
                        
                        <lightning-button label="Back" onclick={prevStep} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Save Settings" onclick={handleSaveSettings}></lightning-button>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
