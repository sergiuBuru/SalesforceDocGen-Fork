<template>
    <lightning-card title="Share Template" icon-name="standard:groups">
        <div class="slds-p-around_medium">
            
            <!-- Search Section -->
            <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                <div class="slds-grid slds-gutters slds-grid_vertical-align-end">
                    <div class="slds-col slds-grow">
                        <lightning-input 
                            type="search" 
                            label="Search Users or Groups" 
                            placeholder="Type to search..." 
                            value={searchTerm}
                            onchange={handleSearchChange}
                            is-loading={isSearching}>
                        </lightning-input>
                        
                        <!-- Search Results Dropdown -->
                        <template if:true={hasSearchResults}>
                            <div class="search-results-container slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                    <template for:each={searchResults} for:item="result">
                                        <li role="presentation" class="slds-listbox__item" key={result.Id} onclick={handleSelectResult} data-id={result.Id}>
                                            <div class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option">
                                                <span class="slds-media__figure slds-listbox__option-icon">
                                                    <lightning-icon icon-name={result.Icon} size="small"></lightning-icon>
                                                </span>
                                                <span class="slds-media__body">
                                                    <span class="slds-listbox__option-text slds-listbox__option-text_entity">{result.Name}</span>
                                                    <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">{result.Type}</span>
                                                </span>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                    
                    <div class="slds-col slds-size_1-of-4">
                        <lightning-combobox
                            label="Access Level"
                            value={selectedAccess}
                            options={accessOptions}
                            onchange={handleAccessChange}>
                        </lightning-combobox>
                    </div>
                    
                    <div class="slds-col slds-no-flex">
                        <lightning-button 
                            variant="brand" 
                            label="Share" 
                            onclick={handleShare}
                            disabled={isShareDisabled}>
                        </lightning-button>
                    </div>
                </div>
                
                <!-- Selected User Label -->
                <template if:true={selectedRecord}>
                     <div class="slds-m-top_x-small">
                        <lightning-pill label={selectedRecord.Name} onremove={handleClearSelection}>
                            <lightning-icon icon-name={selectedRecord.Icon} alternative-text={selectedRecord.Type}></lightning-icon>
                        </lightning-pill>
                    </div>
                </template>
            </div>

            <!-- Existing Shares Table -->
            <h3 class="slds-text-heading_small slds-m-bottom_small">Existing Shares</h3>
            <div style="height: 300px;">
                <lightning-datatable
                    key-field="Id"
                    data={shares}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </div>
            
        </div>
        
        <div slot="footer">
            <lightning-button label="Close" onclick={handleClose}></lightning-button>
        </div>
    </lightning-card>
</template>
