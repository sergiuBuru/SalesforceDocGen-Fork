<template>
    <div class="slds-p-around_medium">
        <div class="slds-grid slds-gutters">
            
            <!-- Main Content -->
            <div class="slds-col slds-size_2-of-3">
                <div class="slds-box slds-theme_default slds-m-bottom_medium">
                    <div class="slds-media slds-media_center slds-m-bottom_medium">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:template" size="large"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h1 class="slds-text-heading_large">Welcome to DocGen</h1>
                            <p class="slds-text-title_caps slds-text-color_weak">Your native document generation engine</p>
                        </div>
                    </div>
                     <p class="slds-text-body_regular slds-m-bottom_medium">
                        DocGen allows you to merge Salesforce data into Microsoft Word and PowerPoint templates seamlessly.
                        Follow the steps below to get started.
                    </p>
                    
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col">
                            <lightning-button variant="brand" label="Create New Template" onclick={navigateToTemplates} class="slds-m-right_small"></lightning-button>
                            <lightning-button label="Bulk Generation" onclick={navigateToBulk}></lightning-button>
                        </div>
                    </div>
                </div>

                <!-- Step by Step -->
                <div class="slds-box slds-theme_default">
                    <h2 class="slds-text-heading_medium slds-m-bottom_medium">How to Create a Document</h2>
                     <lightning-progress-indicator type="path" current-step="step0">
                        <lightning-progress-step label="Create Template Record" value="step1"></lightning-progress-step>
                        <lightning-progress-step label="Upload Word/PPT" value="step2"></lightning-progress-step>
                        <lightning-progress-step label="Map Data" value="step3"></lightning-progress-step>
                        <lightning-progress-step label="Generate" value="step4"></lightning-progress-step>
                    </lightning-progress-indicator>
                    
                     <ul class="slds-timeline slds-m-top_large">
                        <li>
                            <div class="slds-timeline__item_expandable slds-timeline__item_task">
                                <div class="slds-media">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="utility:add" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h3 class="slds-text-heading_small">1. Create a Template Record</h3>
                                        <p>Go to the <strong>Templates</strong> tab and click "New Template" (or use the Wizard). Define the Base Object (e.g. Account) and the Query.</p>
                                    </div>
                                </div>
                            </div>
                        </li>
                        <li>
                            <div class="slds-timeline__item_expandable slds-timeline__item_task">
                                <div class="slds-media">
                                    <div class="slds-media__figure">
                                        <lightning-icon icon-name="utility:upload" size="small"></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h3 class="slds-text-heading_small">2. Upload Your Document</h3>
                                        <p>Create a Word (.docx) or PowerPoint (.pptx) file. Use merge tags like <code>{NAME}</code>. Upload this file to the Template record.</p>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="slds-col slds-size_1-of-3">
                 <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">
                        <lightning-icon icon-name="utility:light_bulb" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        Tips & Tricks
                    </h2>
                    <ul class="slds-list_dotted">
                         <li>Use <code>&#123;#List&#125; ... &#123;/List&#125;</code> for repeating rows in tables.</li>
                         <li>Use <code>docGenTitleEditor</code> in Settings to create dynamic file names.</li>
                         <li>Keep queries simple for best performance.</li>
                         <li>PDFs are generated client-side; test your formatting!</li>
                    </ul>
                </div>
                
                <div class="slds-box slds-theme_warning">
                    <h2 class="slds-text-heading_small slds-m-bottom_small">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="warning" class="slds-m-right_x-small"></lightning-icon>
                        Limits
                    </h2>
                     <ul class="slds-list_dotted">
                         <li><strong>10</strong> Parent Fields max.</li>
                         <li><strong>5</strong> Child Lists max.</li>
                         <li>Wait for libraries to load before clicking Generate.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</template>
