<template>
    <div class="signature-container slds-box slds-theme_default">
        <template if:true={isLocked}>
            <div class="slds-text-align_center slds-p-around_medium slds-text-color_success">
                <lightning-icon icon-name="action:approval" size="large"></lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-top_small">Signature Captured!</h2>
                <p>Your signature has been securely submitted.</p>
            </div>
        </template>

        <template if:true={isProcessing}>
            <div class="slds-is-relative slds-p-around_large slds-text-align_center">
                <lightning-spinner alternative-text="Generating PDF..." size="medium" variant="brand"></lightning-spinner>
                <h2 class="slds-text-heading_small slds-m-top_large">Generating PDF...</h2>
                <p class="slds-text-body_small">Please wait while we finalize your document.</p>
            </div>
        </template>
        
        <template if:true={showPad}>
            <div class="header slds-m-bottom_medium">
                <h2 class="slds-text-heading_small">Please Sign Below</h2>
                <p class="slds-text-body_small slds-text-color_weak">Use your mouse or finger to sign inside the box.</p>
            </div>
            


            <div class="canvas-wrapper slds-m-bottom_medium">
                <canvas 
                    class="signature-pad" 
                    onmousedown={handleMousedown}
                    onmousemove={handleMousemove}
                    onmouseup={handleMouseup}
                    onmouseout={handleMouseup}
                    ontouchstart={handleTouchstart}
                    ontouchmove={handleTouchmove}
                    ontouchend={handleTouchend}
                    lwc:dom="manual">
                </canvas>
            </div>

            <div class="footer slds-grid slds-grid_align-spread">
                <lightning-button 
                    label="Clear" 
                    icon-name="utility:delete" 
                    variant="neutral" 
                    onclick={clearSignature}>
                </lightning-button>
                <lightning-button 
                    label="Complete Signature" 
                    icon-name="utility:save" 
                    variant="brand" 
                    onclick={saveSignature}
                    disabled={isCanvasEmpty}>
                </lightning-button>
            </div>
        </template>
    </div>
</template>
