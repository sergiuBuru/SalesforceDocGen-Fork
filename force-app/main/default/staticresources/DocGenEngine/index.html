<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DocGen Engine</title>
    <script src="html2pdf.js"></script>
    <script src="jszip.min.js"></script>
    <script src="docx-preview.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #f0f0f0; }
        #doc-container {
            background: white;
            padding: 20px;
            /* Approximate Letter size ratio if needed, but docx-preview handles it well */
            background-color: white; 
        }
        /* Hide docx-preview wrapper UI if any */
        .docx-wrapper { background: transparent !important; padding: 0 !important; }
    </style>
</head>
<body>
    <div id="doc-container"></div>
    
    <script>
        console.log('DocGen Engine (High Fidelity) Loaded');
        
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (data.type === 'generate') {
                console.log('DocGen Engine: Rendering DOCX for ' + data.fileName);
                
                const container = document.getElementById('doc-container');
                container.innerHTML = ''; // Clear previous
                
                // Convert ArrayBuffer to Blob if needed, or pass directly
                // docx.renderAsync takes buffer, blob, or file
                try {
                    const docData = data.blob; // Expecting ArrayBuffer
                    
                    // Render DOCX to DOM (High Fidelity)
                    const docxOptions = {
                        className: "docx", 
                        inWrapper: false, 
                        ignoreWidth: false, 
                        ignoreHeight: false,
                        flatten: true 
                    };
                    
                    window.docx.renderAsync(docData, container, container, docxOptions)
                    .then(function() {
                        console.log('DocGen Engine: DOCX Rendered. converting to PDF...');
                        
                        // Now print the container to PDF
                        const opt = {
                            margin:       0.2, // Minimal margin, let docx margins take over
                            filename:     data.fileName + '.pdf',
                            image:        { type: 'jpeg', quality: 0.98 },
                            html2canvas:  { scale: 2, useCORS: true, logging: false },
                            jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                        };
                        
                        return html2pdf().set(opt).from(container).save();
                    })
                    .then(function() {
                        console.log('DocGen Engine: PDF Saved');
                        window.parent.postMessage({ type: 'docgen_success' }, '*');
                    })
                    .catch(function(err) {
                        console.error('DocGen Engine: Render/PDF Error', err);
                        window.parent.postMessage({ type: 'docgen_error', message: err.message }, '*');
                    });
                    
                } catch (e) {
                     console.error('DocGen Engine: Fatal Error', e);
                     window.parent.postMessage({ type: 'docgen_error', message: e.message }, '*');
                }
            }
        });
    </script>
</body>
</html>
